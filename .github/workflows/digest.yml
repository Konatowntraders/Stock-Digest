name: Daily Market Digest

on:
  schedule:
    # Target 6:23 AM Pacific. GitHub-scheduled crons run late (often 5-30 min),
    # so timing isn't exact; :23 is off-peak which helps minimize the drift.
    #   PDT (summer, UTC-7): 6:23 AM = 13:23 UTC  ← currently active
    #   PST (winter, UTC-8): 6:23 AM = 14:23 UTC  ← switch to this when DST ends
    - cron: "23 13 * * 1-5"   # Mon–Fri only
  workflow_dispatch:            # allows manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: python digest.py
